body:
  text: 開府儀同三司特進試鴻臚卿肅國公食邑三千戶賜紫贈司空諡大鑒正號大廣智大興善寺三藏沙門不空奉詔譯依灌頂道場經說脩陀羅尼法門求速出離生死大海應須先入諸佛如來海會灌頂道場受灌頂已發歡喜心從師親受念誦法則後於淨室山林流水最為上勝建立道場安置本尊修真言者面向東方應以瞿摩夷塗拭其地以白檀香磨為香泥以用塗壇或方或圓隨意大小而於壇上散諸名花燒香燈明供養取二淨器盛滿香水安置壇中以用供養行者澡浴或不澡浴悉無障礙但當運心思惟觀察一切眾生本性清淨為諸客塵之所覆蔽不見清淨真如法性為令清淨應當至心蓮華合掌誦此密語真言曰唵娑嚩二合婆引嚩戍度憾由此真言加持力故身口意業悉得清淨然後五輪著地歸命禮十方一切諸佛諸大菩薩方廣大乘右膝著地懺悔隨喜勸請發願以至心每誦此偈歸命十方正等覺最勝妙法菩薩眾以身口意清淨業慇懃合掌恭敬禮無始輪迴諸有中身口意業所生罪如佛菩薩所懺悔我今陳懺亦如是諸佛菩薩行願中金剛三業所生福緣覺聲聞及有情所集善根盡隨喜一切世燈坐道場覺眼開敷照三有我今䠒跪先勸請轉於無上妙法輪所有如來三界主臨般無餘涅槃者我皆勸請令久住不捨悲願救世間懺悔隨喜勸請福願我不失菩提心諸佛菩薩妙眾中常為善友不厭捨離於八難生無難宿命住智相嚴身遠離愚迷具悲智悉能滿足波羅蜜富樂豐饒生勝族眷屬廣多恒熾盛四無礙辯十自在六通諸禪悉圓滿如金剛幢及普賢願讚迴向亦如是次對本尊前結跏趺坐或半跏坐起大慈心我修此法為一切眾生願速證無上正等菩提先磨諸香以用塗手然後結於佛部三昧耶陀羅尼印以二手虛心合掌開二頭指屈輔二中指上節二大指屈輔二頭指下節其印即成置印當心想於如來三十二相八十種好了了分明如對目前至心誦此真言七遍真言曰唵怛他引蘖覩引納婆二合嚩引也娑嚩二合訶引由結此印及誦真言故即警覺一切如來悉當護念加持行者以光明照觸所有罪障皆得消滅壽命長遠福慧增長佛部聖眾擁護歡喜生生世世離諸惡趣蓮花化生速證無上正等菩提次結蓮花部三昧耶印以二手虛心合掌散開二頭指二中指二無名指微屈如開敷蓮花形安於當心想觀自在菩薩相好持妙蓮花即誦此真言七遍於頂右散真言曰唵跛娜謨二合引納婆二合嚩引也娑嚩二合引訶由結此印及誦真言故即警覺觀自在菩薩等持蓮花者一切菩薩蓮花部聖眾悉皆歡喜加持護念一切菩薩光明照觸所有罪障皆得消滅一切菩薩常為善友次結金剛部三昧耶印以左手翻掌向外以右手掌背安左手背用左右大指小指互相鉤如金剛杵形安置於當心想金剛藏菩薩持妙金剛杵威光相好即誦真言七遍於頂上左散之真言曰唵嚩日嚧二合納婆二合嚩引也娑嚩二合引訶引由結此印及誦真言故即警覺一切金剛聖眾加持擁護所有罪障悉皆除滅一切痛苦終不著身當得金剛堅固之體一切諸魔不能侵嬈次結護身被金剛甲冑印以二手內相叉右押左竪二中指頭相中屈二頭指如鉤形於中指背勿令相著並二大指押無名指即成以印加持自身五處所謂額次右肩次左肩次心次喉於頂上散印各誦真言一遍真言曰唵嚩日囉二合引𭨆儞二合引鉢囉二合捻奴揖反引跛跢二合也娑嚩二合引訶由結此印及誦真言加持故即成被金剛甲冑所有毘那夜迦及諸天魔作障礙者退散馳走悉見行者光明被身威德自在若居山林及在嶮難皆悉無畏所有水火等災一切厄難虎狼師子刀杖枷鎖如是等事皆悉消滅見者歡喜命終已後不墮惡趣當生諸佛淨妙國土次結地界金剛橛印右無名指入左無名指小指內中指入左中指頭指內左亦如之皆頭外出餘指並頭相拄即想印成火焰金剛杵形大指著地掣之一掣一誦至三便止隨意大小標心即成堅固地界真言曰唵枳里枳里一嚩日囉二合引嚩日哩二合二部𠷈二合半音滿馱滿馱吽引癹吒半音由結此印及誦真言加持地界故下至水際如金剛座天魔及諸障者不為惱害少加功力速得成就次結方隅金剛牆印准前地界印開二大指直竪側如牆形想印如金剛杵形右遶身三轉標心大小即成金剛堅固之城諸佛菩薩尚不違越何況諸餘難調伏者毘那夜迦及毒蟲利牙爪者不輔近真言曰唵薩囉薩囉嚩日囉二合引鉢囉二合迦引囉吽引癹吒半音行者次應想於壇中八葉大蓮花花上有妙師子座座上有七寶樓閣垂諸瓔珞繒綵幡蓋寶柱行列垂妙天衣周布香雲普雨雜花奏諸音樂寶瓶閼伽天妙飲食摩尼為燈作此觀已而誦此偈以我功德力如來加持力及以法界力普供養而住說此偈已次結大虛空藏普通供養印以二手合掌以二中指右壓左外相叉博著手背以二頭指相拄反蹙如寶形結印成已誦真言四遍普通供養真言曰唵誐誐曩三去婆去嚩嚩日囉二合引斛引由結此印及誦真言加持力故所想供養真實無異一切聖眾皆得受用次應結寶車輅印二手內相叉仰掌二頭指橫相拄以二大指各捻頭指根下想印成七寶車輅金剛駕御寶車乘空而去至於極樂世界請諸聖眾即誦真言三遍真言曰唵都嚕都嚕吽由結此印真言加持故七寶車輅至彼極樂國土又想如意輪觀自在菩薩及諸聖眾眷屬圍遶乘寶車輅至道場中虛空而住次結請車輅印便誦請事輅真言以二大指向身撥二中指頭誦三遍真言曰娜麼悉底囉三合野地尾二合迦引南引二合怛他引孽多引喃引唵嚩日𠻴二合𭨆儞二合引羯唎沙二合也娑嚩二合引訶引由此真言印加持故聖眾從本土來至此道場空虛而住次結請本尊三昧耶降至於道場印二手內相叉作拳左大指屈入掌中以右大母指向身招之誦真言七遍真言曰唵阿嚧引力迦半音阿孽車阿孽車娑嚩二合引訶由此真言印加持觀自在菩薩不越本誓故即赴集於道場受此供養次應辟除諸作障者結蓮花部明王馬頭觀自在菩薩真言印二手合掌屈二頭指無名指於掌內甲相背竪開二大指微屈離頭指二小指二中指各各合竪即成隨誦真言以印頂上左旋三匝想辟除諸作難障者一切諸魔見此印已退散馳走便右旋三匝即成結界明王真言曰唵阿密哩二合覩引納皤二合嚩吽引癹吒半音娑嚩二合引訶次結上方金剛網印准前牆印二大指捻二頭指下節誦真言三遍以印頂上右轉三匝真言曰唵尾娑普二合囉捺囉二合乞叉二合嚩日囉二合引半惹囉吽癹吒半音由結此印真言加持故即成金剛堅固不壞之網次結金剛火院密縫印以左手掩右手背竪二大指誦真言三遍右遶身三匝想金剛牆外有三重火焰圍遶真言曰唵阿三莽𡁬儞二合吽癹吒半音次獻閼伽香水真言印二手捧器當額奉獻想洛聖眾足誦真言三遍真言曰曩莫三滿多沒馱引南誐誐曩娑莽娑忙娑嚩二合引訶引由獻閼伽香水故行者獲得三業清淨洗滌煩惱垢次當結獻蓮花座印二手虛心合掌舒開左右無名指中指頭指屈如微敷蓮花形在寶樓閣內諸聖及本尊各坐本位眷屬圍遶了了分別誦真言三遍真言曰唵迦麼攞娑嚩二合引訶引由結蓮花座印加持奉獻故行者當得十地滿足當得金剛之座次結普供養印二手合掌以十指右押左互相交上節即成誦真言三遍想從印流出無量無邊塗香雲海花鬘雲海燒香雲海飲食燈明雲海皆成清淨廣大供養即誦普供養真言三遍真言曰娜莫薩嚩怛他去引蘖帝引毘喻二合引一尾濕嚩二合目契引毘藥二合一薩嚩他引欠搵娜𮒶二合底娑頗三合囉呬引𤚥誐誐曩劍娑嚩二合引訶次應誦讚歎偈迦麼攞目佉一迦麼攞路引左娜二迦麼攞引娑那三迦麼攞賀娑跢二合四迦麼攞引娑母儞五迦麼攞迦麼攞六三娑嚩七娑迦攞麼攞八乞叉二合囉娜九那麼悉帝次應思惟想於自身中正當胸間如滿月形光明晃曜月上有八葉蓮花於蓮花胎中有如意寶珠如紅頗梨色爀奕光明照無量世界於光明中涌出本尊如意輪觀自在菩薩具足六臂相好圓滿住思惟相作是觀已起大悲心即結如意輪根本印二手合掌二頭指屈如寶形二中指屈相拄如蓮花葉合竪二大指即成相如意輪菩薩如對目前了了分明即誦根本陀羅尼七遍頂上散印真言曰曩謨囉怛曩二合怛羅夜引也二合曩莫阿引哩夜二合引嚩𡀔引枳帝濕嚩二合囉引也引地薩怛嚩二合引也摩賀引薩怛嚩二合引也摩賀引迦引嚕抳迦引也怛儞也二合他去引唵斫訖囉二合𮧬底振多引麼抳麼賀引跛納銘二合嚕嚕底瑟姹二合入嚩二合攞阿迦囉灑二合也吽泮吒半音娑嚩二合引訶次結如意輪心印准前根本印二無名指二小指右壓左外相叉即成誦心真言七遍頂上散之真言曰唵跛娜麼二合振跢引麼抳入嚩二合攞吽次結心中心印准前心印中指外相叉小指橫竪即成誦心中心真言七遍頂上散之真言曰唵嚩囉娜跛納銘二合吽即持念珠蟠於掌中以心中心真言加持七遍然後持珠當心次第記數念誦滿一百八遍或一千八十遍心住本尊三摩地更莫異緣了了分明遍數了了珠安掌中頂戴安置本處然後結根本印心印心中心三印即入三摩地觀即觀心圓明漸舒廓周法界不見身心成清淨法界乃至食頃從三昧出次結普供養印獻香花等及閼伽水讚歎發願即結火院結界印頭上左轉一遍即成解界次結車輅印向外撥之次結迎請印向外撥之次結護身印印五處已次結三部三昧耶印即出道場任意經行讀誦大乘經典迴助心中所求上中下悉地行者若能日日三時依此念誦罪障消滅得大智慧三昧成就本尊現前能獲功德如經所述
